<h2>Calculator</h2>

<input type="number" id="num1" placeholder="First number">
<input type="number" id="num2" placeholder="Second number">

<select id="operator">
  <option value="+">+</option>
  <option value="-">-</option>
  <option value="*">*</option>
  <option value="/">/</option>
</select>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>


<h2>Grade Tracker</h2>

<button onclick="showGrades()">Show Grades</button>

<p id="grades"></p>
